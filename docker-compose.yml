services:
  # Le frontend Angular
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    command: sh -c "npx ng serve --host 0.0.0.0"
    depends_on:
      - backend
  # Le backend APIrest Laravel
  backend:
    build: ./backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db-sqlabs
      - DB_PORT=3306
      - DB_DATABASE=sqlabs_db
      - DB_USERNAME=sqlabs_user
      - DB_PASSWORD=password_gate
    depends_on:
      - db-sqlabs

  # La base de données MySQL
  db-sqlabs:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: sqlabs_db
      MYSQL_USER: sqlabs_user
      MYSQL_PASSWORD: password_gate
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql

  # INTERFACE DB (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db-sqlabs
    depends_on:
      - db-sqlabs

volumes:
  mysql_data:
